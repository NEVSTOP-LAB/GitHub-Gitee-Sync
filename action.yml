name: 'GitHub Gitee Sync'
description: 'Sync all repositories (public/private) between GitHub and Gitee'
author: 'NEVSTOP-LAB'

inputs:
  github-owner:
    description: 'GitHub username or organization name'
    required: true
  github-token:
    description: 'GitHub Personal Access Token (needs repo scope; also needs read:org scope for organization repos)'
    required: true
  gitee-owner:
    description: 'Gitee username or organization name'
    required: true
  gitee-token:
    description: 'Gitee Personal Access Token (needs projects scope)'
    required: true
  account-type:
    description: 'Account type: user or org. Applies to both GitHub and Gitee sides (asymmetric types are not supported).'
    required: false
    default: 'user'
  include-private:
    description: 'Whether to include private repositories'
    required: false
    default: 'true'
  include-repos:
    description: 'Comma-separated list of repository names to include (allow list). When set, ONLY these repos are synced. Takes precedence over exclude-repos.'
    required: false
    default: ''
  exclude-repos:
    description: 'Comma-separated list of repository names to exclude'
    required: false
    default: ''
  direction:
    description: 'Sync direction: github2gitee, gitee2github, or both'
    required: false
    default: 'github2gitee'
  create-missing-repos:
    description: 'Whether to create repos on target platform if they do not exist'
    required: false
    default: 'true'
  sync-extra:
    description: 'Comma-separated list of extra items to sync: releases,wiki,labels,milestones,issues'
    required: false
    default: ''
  dry-run:
    description: 'Run all logic without actual sync (for debugging/testing)'
    required: false
    default: 'false'
  visibility:
    description: 'Filter repos by visibility: all, public, or private (default: all). Applied after include/exclude filtering.'
    required: false
    default: 'all'
  show-private-repo-names:
    description: >
      Controls how private repository names appear in logs (default: false).
      false/no/none: mask as [private];
      true/yes/full: show full name;
      N (positive integer): show only the first N characters followed by '****'
      wrapped in brackets (e.g. 3 → '[CSM****]').
    required: false
    default: 'false'
  git-timeout:
    description: >
      Timeout in seconds for individual git operations such as clone and push
      (default: 900). Increase this value for very large repositories or
      slow/unreliable networks.
    required: false
    default: '900'

outputs:
  synced-count:
    description: 'Number of repositories successfully synced'
  failed-count:
    description: 'Number of repositories that failed to sync'
  skipped-count:
    description: 'Number of repositories skipped'
  sync-log:
    description: 'Collected warnings and errors from the sync process'

runs:
  using: 'docker'
  image: 'Dockerfile'

branding:
  icon: 'refresh-cw'
  color: 'blue'
